# Deploys the Spring Boot backend container.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: hospital-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: hospital-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql-service:3306/hospital_db"
