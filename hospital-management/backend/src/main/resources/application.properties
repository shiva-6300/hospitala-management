# Server port for the Spring Boot application
server.port=8081

# ---- Database connection settings ----
# "mysql-db" is the hostname of the MySQL container when running via docker-compose
spring.datasource.url=jdbc:mysql://mysql-db:3306/hospital_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate settings ----
# "update" will auto-create/update tables based on our Patient entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Run data.sql after Hibernate creates tables (for sample data)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
