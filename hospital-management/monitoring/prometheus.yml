# Minimal Prometheus configuration.
# It scrapes metrics from the Spring Boot backend every 15 seconds.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'hospital-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend:8080']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
